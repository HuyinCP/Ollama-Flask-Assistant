<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee Help Center Assistant</title>
    <meta name="description" content="AI Assistant hỏi đáp về chính sách Shopee, chạy local với Ollama + LangChain RAG.">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Shopee Help Center Assistant</h1>
        <p>Hỏi đáp chính sách Shopee — powered by <strong>RAG + LangChain + Ollama</strong></p>

        <div id="chat-box">
            <div id="chat-messages"></div>
        </div>

        <div class="input-group">
            <textarea id="message" rows="2" placeholder="Nhập câu hỏi về chính sách Shopee..."></textarea>
            <button id="send-btn">Gửi</button>
        </div>

        <div id="status" class="hidden"></div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
